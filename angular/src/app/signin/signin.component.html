<div class="min-h-screen gradient-custom from-slate-900 via-slate-800 to-slate-900 flex flex-col p-4">
    <ngx-spinner type = "ball-beat" *ngIf="loading" name="loading" [fullScreen]="true"></ngx-spinner>

    <!-- Logo section - full width -->
    <div class="w-full mb-8">
        <img src="assets/drx.png" alt="Logo" class="w-32 h-auto">
    </div>

    <!-- Card section - centered vertically and horizontally -->
    <div class="flex-1 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-2xl overflow-hidden border border-slate-700 w-[70vw]">
            <div class="p-8">
                <div class="text-center mb-8">
                    <h2 class="text-2xl font-bold text-cyan-700 uppercase mb-2">Authentification</h2>
                    <p class="text-slate-400">Badgez s'il vous plait</p>
                </div>

                <div class="mb-6">
                    <input type="password" #badgeIdInput placeholder="ID de Badge"
                        class="w-full px-4 py-3 rounded-lg bg-slate-700 text-white text-center placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 border border-slate-600"
                        [(ngModel)]="badgeId" (keyup)="onKey($event)" />
                </div>

                <p class="text-yellow-500 text-center mb-4" *ngIf="message">{{message}}</p>

                <div class="text-center">
                    <p class="text-slate-400">Première fois? <a routerLink="/signup"
                            class="text-indigo-400 font-semibold hover:text-indigo-300 transition">S'inscrire</a></p>
                </div>
            </div>
        </div>

        <!-- Stock Info Footer -->
        <div class="fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 text-white p-4 rounded-t-lg">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div>A : {{stock.stockA}}</div>
                <div>B : {{stock.stockB}}</div>
            </div>
        </div>
    </div>
</div>
