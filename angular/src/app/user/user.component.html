<div class="min-h-screen gradient-custom from-slate-900 via-slate-800 to-slate-900 flex flex-col p-4">
    <!-- Logo section - full width -->
    <div class="w-full mb-8">
        <img src="assets/drx.png" alt="Logo" class="w-32 h-auto">
    </div>

    <!-- Card section - centered vertically and horizontally -->
    <div class="flex-1 flex items-center justify-center">
        <div class="bg-white rounded-lg shadow-2xl overflow-hidden border border-slate-700 w-[70vw]">
            <div class="p-8 text-center">
                <!-- Action Message - Displayed when product is dispensed -->
                <div *ngIf="showMessage" class="mb-6 p-6 bg-green-100 border-2 border-green-500 rounded-lg animate-pulse">
                    <p class="text-green-700 text-2xl font-bold">{{ messageText }}</p>
                </div>

                <p class="text-cyan-700 mb-4 text-lg">Bonjour <span class="font-bold">{{user.name}}</span></p>

                <!-- Stock availability messages -->
                <p class="text-blue-400 text-base mb-4" *ngIf="stock.stockA>0 && stock.stockB>0">Veuillez Choisir
                    entre A ou B</p>
                <p class="text-yellow-400 text-base mb-4" *ngIf="stock.stockA>0 && stock.stockB==0">Veuillez choisir
                    le choix A</p>
                <p class="text-yellow-400 text-base mb-4" *ngIf="stock.stockA==0 && stock.stockB>0">Veuillez choisir
                    le choix B</p>
                <p class="text-red-400 text-base mb-4" *ngIf="stock.stockA==0 && stock.stockB==0">Les deux
                    reservoirs sont Vides</p>

                <!-- User balance messages -->
                <p class="text-green-400 text-base font-bold mb-2" *ngIf="user.stock>0">Solde Suffisant</p>
                <p class="text-red-400 text-base font-bold mb-2" *ngIf="user.stock==0">Solde insuffisant</p>
                <p class="text-base">Stock Restant: <span class="font-bold">{{user.stock}}</span></p>
            </div>

            <!-- Action buttons -->
            <div class="flex justify-between gap-4 m-8">
                <button mat-raised-button color="primary" (click)="updateUser('stockA')" class="flex-1">
                    A
                </button>
                <button mat-raised-button color="primary" (click)="updateUser('stockB')" class="flex-1">
                    B
                </button>
            </div>
        </div>
    </div>

    <!-- Stock Info Footer -->
    <div class="fixed bottom-0 left-0 right-0 bg-slate-800 border-t border-slate-700 text-white p-4 rounded-t-lg">
        <div class="flex justify-between items-center max-w-md mx-auto">
            <div>A : {{stock.stockA}}</div>
            <div>B : {{stock.stockB}}</div>
        </div>
    </div>
</div>
